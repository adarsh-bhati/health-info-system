<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - HealthAI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    min-height: 100vh;
}

/* NAVBAR */
.navbar-custom {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    padding: 15px 30px;
}

.navbar-brand {
    font-size: 28px;
    font-weight: bold;
    color: white !important;
}

.nav-link {
    color: white !important;
    font-size: 16px;
    margin-left: 15px;
}

/* MAIN CARD */
.dashboard-container {
    max-width: 1000px;
    margin: 60px auto;
    padding: 20px;
}

.welcome-card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(15px);
    border-radius: 25px;
    padding: 50px;
    color: white;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.25);
}

.welcome-card h1 {
    font-size: 48px;
    font-weight: 700;
}

.welcome-card p {
    font-size: 20px;
    opacity: 0.95;
    margin-top: 10px;
}

/* ACTION BUTTONS */
.actions {
    margin-top: 50px;
}

.action-btn {
    padding: 20px;
    border-radius: 20px;
    font-size: 20px;
    font-weight: 600;
    width: 100%;
    border: none;
    transition: 0.3s;
}

.action-btn:hover {
    transform: translateY(-5px);
    box-shadow: 0 10px 20px rgba(0,0,0,0.2);
}

.chat-btn {
    background: #0d6efd;
    color: white;
}

.symptom-btn {
    background: #198754;
    color: white;
}

.upload-btn {
    background: #ffc107;
    color: black;
}

.logout-btn {
    background: #dc3545;
    color: white;
}

@media (max-width: 768px) {
    .welcome-card h1 {
        font-size: 34px;
    }

    .welcome-card p {
        font-size: 16px;
    }
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container-fluid">
        <a class="navbar-brand" href="/dashboard">HealthAI</a>

        <div class="ms-auto">
            <a class="nav-link d-inline" href="/logout">Logout</a>
        </div>
    </div>
</nav>

<div class="dashboard-container">

    <div class="welcome-card">
        <h1>Welcome, {{ current_user.username }} 👋</h1>
        <p>Your AI Healthcare Assistant Dashboard</p>

        <div class="actions">
            <div class="row g-4">

                <div class="col-md-6">
                    <a href="/chat">
                        <button class="action-btn chat-btn">
                            🤖 AI Health Chat
                        </button>
                    </a>
                </div>

                <div class="col-md-6">
                    <a href="/symptoms">
                        <button class="action-btn symptom-btn">
                            🤒 Symptom Checker
                        </button>
                    </a>
                </div>

                <div class="col-md-12">
                    <a href="/upload">
                        <button class="action-btn upload-btn">
                            📄 Upload Medical Report And Analyze
                        </button>
                    </a>
                </div>

            </div>
        </div>

    </div>

</div>

</body>
</html>
