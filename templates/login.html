<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - HealthAI</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{
    background:#0f172a;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    font-family:'Segoe UI',sans-serif;
}
.login-card{
    width:420px;
    background:#1e293b;
    border-radius:20px;
    padding:40px;
    box-shadow:0 0 25px rgba(0,0,0,0.4);
}
.form-control{
    background:#334155;
    border:none;
    color:white;
}
.form-control:focus{
    background:#334155;
    color:white;
    box-shadow:none;
}
.form-control::placeholder{
    color:#cbd5e1;
}
.signup-link{
    color:#0dcaf0;
    text-decoration:none;
}
.signup-link:hover{
    text-decoration:underline;
}
</style>
</head>
<body>
<div class="login-card">
    <h2 class="text-center mb-3">HealthAI Login</h2>
    <p class="text-center text-secondary mb-4">Wearable Healthcare Monitoring</p>
    <form id="loginForm">
        <div class="mb-3">
            <label class="mb-2">Username</label>
            <input type="text" class="form-control" id="username" placeholder="Enter username" required>
        </div>
        <div class="mb-4">
            <label class="mb-2">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter password" required>
        </div>
        <button class="btn btn-primary w-100 py-2">Login</button>
    </form>
    <div id="statusMsg" class="mt-4"></div>
    <div class="text-center mt-4">
        New User? <a href="/signup" class="signup-link">Create Account</a>
    </div>
</div>
<script>
document.getElementById("loginForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const loginData = {
        username: document.getElementById("username").value,
        password: document.getElementById("password").value
    };
    const response = await fetch("/api/login", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify(loginData)
    });
    const result = await response.json();
    if(result.status === "success"){
        document.getElementById("statusMsg").innerHTML = `<div class="alert alert-success">✅ Login Successful</div>`;
        setTimeout(()=>{ window.location.href = result.next; },1000);
    } else {
        document.getElementById("statusMsg").innerHTML = `<div class="alert alert-danger">❌ ${result.message}</div>`;
    }
});
</script>
</body>
</html>
