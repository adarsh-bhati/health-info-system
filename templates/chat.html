<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health AI Chat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    margin:0;
    font-family:'Segoe UI',sans-serif;
    background:#f5f5f5;
    height:100vh;
    overflow:hidden;
}

.wrapper{
    display:flex;
    height:100vh;
}

/* Sidebar */
.sidebar{
    width:300px;
    background:#202123;
    color:white;
    display:flex;
    flex-direction:column;
    padding:15px;
}

.new-chat-btn{
    width:100%;
    margin-bottom:15px;
}

.chat-list{
    flex:1;
    overflow-y:auto;
}

.chat-item{
    background:#343541;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
    cursor:pointer;
    display:flex;
    justify-content:space-between;
    align-items:center;
    transition:0.2s;
}

.chat-item:hover{
    background:#444654;
}

.delete-btn{
    color:#ff6b6b;
    cursor:pointer;
    font-size:18px;
}

.sidebar-footer{
    margin-top:15px;
}

/* Main Chat */
.main-chat{
    flex:1;
    display:flex;
    flex-direction:column;
    background:white;
}

.chat-header{
    background:#0d6efd;
    color:white;
    padding:18px;
    font-size:20px;
    font-weight:600;
}

.chat-box{
    flex:1;
    overflow-y:auto;
    padding:20px;
    background:#f8f9fa;
}

.message{
    display:flex;
    margin-bottom:15px;
}

.user{
    justify-content:flex-end;
}

.bot{
    justify-content:flex-start;
}

.bubble{
    padding:12px 16px;
    border-radius:15px;
    max-width:75%;
    word-wrap:break-word;
    line-height:1.5;
}

.user .bubble{
    background:#0d6efd;
    color:white;
}

.bot .bubble{
    background:#e9ecef;
    color:black;
}

.typing{
    padding-left:20px;
    font-size:14px;
    color:gray;
}

.chat-input{
    display:flex;
    padding:15px;
    border-top:1px solid #ddd;
    background:white;
}

.chat-input textarea{
    flex:1;
    resize:none;
    border:1px solid #ccc;
    border-radius:12px;
    padding:12px;
    max-height:120px;
    overflow-y:auto;
}

.chat-input button{
    margin-left:10px;
}

@media(max-width:768px){
    .sidebar{
        width:220px;
    }
}
</style>
</head>

<body>

<div class="wrapper">

    <!-- Sidebar -->
    <div class="sidebar">

        <button class="btn btn-primary new-chat-btn" onclick="createNewChat()">
            + New Chat
        </button>

        <div id="chatList" class="chat-list"></div>

        <div class="sidebar-footer">
            <a href="/dashboard" class="btn btn-light w-100">
                ← Back
            </a>
        </div>

    </div>

    <!-- Main Chat -->
    <div class="main-chat">

        <div class="chat-header">
            🤖 Health AI Assistant
        </div>

        <div id="chatBox" class="chat-box"></div>

        <div id="typing" class="typing"></div>

        <div class="chat-input">
            <textarea
                id="input"
                rows="1"
                placeholder="Ask health-related questions..."
                onkeydown="handleEnter(event)"
                oninput="autoResize(this)"
            ></textarea>

            <button class="btn btn-primary" onclick="sendMessage()">
                Send
            </button>
        </div>

    </div>

</div>

<script>
let currentConversationId = null;

/* Create new chat */
async function createNewChat(){

    let res = await fetch("/api/new-chat", {
        method:"POST"
    });

    let data = await res.json();

    currentConversationId = data.conversation_id;

    document.getElementById("chatBox").innerHTML = "";

    loadConversations();
}

/* Load all conversations */
async function loadConversations(){

    let res = await fetch("/api/conversations");
    let conversations = await res.json();

    let list = document.getElementById("chatList");

    list.innerHTML = "";

    conversations.forEach(convo => {

        let div = document.createElement("div");
        div.className = "chat-item";

        div.innerHTML = `
            <span onclick="loadConversation('${convo.id}')">
                ${convo.title}
            </span>
            <span class="delete-btn" onclick="deleteConversation('${convo.id}')">
                🗑
            </span>
        `;

        list.appendChild(div);
    });
}

/* Load single conversation */
async function loadConversation(id){

    currentConversationId = id;

    let res = await fetch(`/api/conversation/${id}`);
    let messages = await res.json();

    let box = document.getElementById("chatBox");

    box.innerHTML = "";

    messages.forEach(msg => {
        addMessage(msg.content, msg.role === "assistant" ? "bot" : "user");
    });
}

/* Delete chat */
async function deleteConversation(id){

    await fetch(`/api/delete-conversation/${id}`, {
        method:"POST"
    });

    if(currentConversationId === id){
        document.getElementById("chatBox").innerHTML = "";
        currentConversationId = null;
    }

    loadConversations();
}

/* Add message bubble */
function addMessage(text, sender){

    let box = document.getElementById("chatBox");

    let div = document.createElement("div");
    div.className = "message " + sender;

    div.innerHTML = `
        <div class="bubble">
            ${text.replace(/\n/g,"<br>")}
        </div>
    `;

    box.appendChild(div);

    box.scrollTop = box.scrollHeight;
}

/* Send message */
async function sendMessage(){

    let input = document.getElementById("input");
    let msg = input.value.trim();

    if(!msg) return;

    if(!currentConversationId){
        await createNewChat();
    }

    addMessage(msg, "user");

    input.value = "";
    input.style.height = "auto";

    document.getElementById("typing").innerText = "AI is typing...";

    let res = await fetch("/api/chat", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            message: msg,
            conversation_id: currentConversationId
        })
    });

    let data = await res.json();

    document.getElementById("typing").innerText = "";

    addMessage(data.response, "bot");

    loadConversations();
}

/* Enter send */
function handleEnter(event){
    if(event.key === "Enter" && !event.shiftKey){
        event.preventDefault();
        sendMessage();
    }
}

/* Auto resize */
function autoResize(el){
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
}

/* Initial load */
loadConversations();
</script>

</body>
</html>
